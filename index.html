<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Mill Monitor - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .unit {
            font-size: 1em;
            color: #999;
            margin-left: 5px;
        }

        .stat-card .timestamp {
            font-size: 0.8em;
            color: #999;
            margin-top: 10px;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chart-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
        }

        .chart-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #666;
        }

        .chart-btn.active {
            background: #667eea;
            color: white;
        }

        .chart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        canvas {
            max-height: 300px;
            width: 100% !important;
        }

        .data-table {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        .data-table h3 {
            margin-bottom: 15px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f5f5f5;
            color: #333;
            font-weight: 600;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-online {
            background: #4caf50;
        }

        .status-offline {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌬️ Wind Mill Monitor Dashboard</h1>

        <div class="stats-container">
            <div class="stat-card">
                <h3>Current Temperature</h3>
                <span class="value" id="current-temp">--</span>
                <span class="unit">°C</span>
                <div class="timestamp" id="temp-time">Last update: --</div>
            </div>
            <div class="stat-card">
                <h3>Current Voltage</h3>
                <span class="value" id="current-voltage">--</span>
                <span class="unit">V</span>
                <div class="timestamp" id="voltage-time">Last update: --</div>
            </div>
            <div class="stat-card">
                <h3>Average Temperature</h3>
                <span class="value" id="avg-temp">--</span>
                <span class="unit">°C</span>
                <div class="timestamp">Last 24 hours</div>
            </div>
            <div class="stat-card">
                <h3>Average Voltage</h3>
                <span class="value" id="avg-voltage">--</span>
                <span class="unit">V</span>
                <div class="timestamp">Last 24 hours</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Temperature & Voltage Trends</div>
                <div class="chart-controls">
                    <button class="chart-btn active" onclick="changeTimeRange('hour')">Hour</button>
                    <button class="chart-btn" onclick="changeTimeRange('day')">Day</button>
                    <button class="chart-btn" onclick="changeTimeRange('week')">Week</button>
                </div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="data-table">
            <h3>Recent Readings</h3>
            <table id="readings-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Temperature (°C)</th>
                        <th>Voltage (V)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="4">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDWkRYW-8tFUaRnxXb29CYBvrgaqxEMZUs",
            databaseURL: "https://wind-monitor-26320-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "wind-monitor-26320",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Chart instance
        let mainChart;
        let currentTimeRange = 'hour';
        let historicalData = [];

        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Temperature (°C)',
                        data: [],
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y-temperature'
                    }, {
                        label: 'Voltage (V)',
                        data: [],
                        borderColor: '#4ecdc4',
                        backgroundColor: 'rgba(78, 205, 196, 0.1)',
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y-voltage'
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                        }
                    },
                    scales: {
                        yTemperature: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Temperature (°C)'
                            }
                        },
                        yVoltage: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Voltage (V)'
                            },
                            grid: {
                                drawOnChartArea: false,
                            },
                        }
                    }
                }
            });
        }

        // Format timestamp
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        // Format time for chart labels
        function formatChartTime(timestamp, range) {
            const date = new Date(timestamp);
            if (range === 'hour') {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (range === 'day') {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        // Update current stats
        function updateCurrentStats(snapshot) {
            const data = snapshot.val();
            if (data) {
                document.getElementById('current-temp').textContent = data.Temperature?.toFixed(1) || '--';
                document.getElementById('current-voltage').textContent = data.Voltage?.toFixed(1) || '--';
                
                const now = new Date();
                document.getElementById('temp-time').textContent = `Last update: ${formatTimestamp(now)}`;
                document.getElementById('voltage-time').textContent = `Last update: ${formatTimestamp(now)}`;
            }
        }

        // Update averages
        function updateAverages() {
            if (historicalData.length === 0) return;
            
            const last24Hours = historicalData.filter(d => 
                (Date.now() - d.timestamp) <= 24 * 60 * 60 * 1000
            );
            
            if (last24Hours.length > 0) {
                const avgTemp = last24Hours.reduce((sum, d) => sum + d.temperature, 0) / last24Hours.length;
                const avgVolt = last24Hours.reduce((sum, d) => sum + d.voltage, 0) / last24Hours.length;
                
                document.getElementById('avg-temp').textContent = avgTemp.toFixed(1);
                document.getElementById('avg-voltage').textContent = avgVolt.toFixed(1);
            }
        }

        // Update table
        function updateTable() {
            const tableBody = document.getElementById('table-body');
            const recentData = [...historicalData].reverse().slice(0, 10);
            
            if (recentData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4">No data available</td></tr>';
                return;
            }
            
            tableBody.innerHTML = recentData.map(data => `
                <tr>
                    <td>${formatTimestamp(data.timestamp)}</td>
                    <td>${data.temperature.toFixed(1)}</td>
                    <td>${data.voltage.toFixed(1)}</td>
                    <td>
                        <span class="status-indicator status-online"></span>
                        Online
                    </td>
                </tr>
            `).join('');
        }

        // Update chart based on time range
        function updateChart() {
            if (!mainChart || historicalData.length === 0) return;
            
            const now = Date.now();
            let timeLimit;
            
            switch(currentTimeRange) {
                case 'hour':
                    timeLimit = now - 60 * 60 * 1000;
                    break;
                case 'day':
                    timeLimit = now - 24 * 60 * 60 * 1000;
                    break;
                case 'week':
                    timeLimit = now - 7 * 24 * 60 * 60 * 1000;
                    break;
            }
            
            const filteredData = historicalData
                .filter(d => d.timestamp >= timeLimit)
                .sort((a, b) => a.timestamp - b.timestamp);
            
            const labels = filteredData.map(d => formatChartTime(d.timestamp, currentTimeRange));
            const tempData = filteredData.map(d => d.temperature);
            const voltageData = filteredData.map(d => d.voltage);
            
            mainChart.data.labels = labels;
            mainChart.data.datasets[0].data = tempData;
            mainChart.data.datasets[1].data = voltageData;
            mainChart.update();
        }

        // Change time range
        function changeTimeRange(range) {
            currentTimeRange = range;
            
            // Update active button
            document.querySelectorAll('.chart-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateChart();
        }

        // Listen for real-time updates
        function initializeFirebaseListeners() {
            // Listen for current data
            database.ref('/WindMill').on('value', (snapshot) => {
                updateCurrentStats(snapshot);
                
                // Add to historical data
                const data = snapshot.val();
                if (data && data.Temperature && data.Voltage) {
                    historicalData.push({
                        timestamp: Date.now(),
                        temperature: data.Temperature,
                        voltage: data.Voltage
                    });
                    
                    // Keep only last 7 days of data
                    const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
                    historicalData = historicalData.filter(d => d.timestamp >= weekAgo);
                    
                    updateAverages();
                    updateTable();
                    updateChart();
                }
            });
        }

        // Initialize on page load
        window.onload = () => {
            initChart();
            initializeFirebaseListeners();
        };
    </script>
</body>
</html>
